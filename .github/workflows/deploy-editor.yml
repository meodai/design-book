name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Editor → site/ (root)
      - run: npm run build:editor
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      # Article → site/article/
      - run: npm run build:article
        env:
          BASE_PATH: /${{ github.event.repository.name }}/article/

      # Combine both builds into one upload directory.
      - name: Assemble site
        run: |
          mkdir -p site
          cp -r editor-dist/. site/
          cp -r article-dist site/article

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
