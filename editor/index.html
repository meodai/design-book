<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Book Editor</title>
  <meta name="description" content="Interactive editor for Design Book — a reactive TypeScript design system framework. Define tokens with relationships, compute derived values automatically, and render to CSS, JSON, or W3 Design Tokens.">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Design Book">
  <meta property="og:title" content="Design Book Editor">
  <meta property="og:description" content="Interactive editor for Design Book: define tokens with relationships, compute derived values automatically, and render to CSS, JSON, or W3 Design Tokens.">
  <meta property="og:url" content="https://meodai.github.io/design-book/">
  <meta property="og:image" content="https://meodai.github.io/design-book/og.png">
  <meta property="og:image:alt" content="Design Book — a reactive TypeScript design system framework.">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Design Book Editor">
  <meta name="twitter:description" content="Interactive editor for Design Book: tokens with relationships, derived values, and live CSS / JSON / W3 output.">
  <meta name="twitter:image" content="https://meodai.github.io/design-book/og.png">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Design Book</h1>
  <div class="layout">
    <div class="input-column" id="input-column">
      <!-- Scopes and tokens will be rendered here -->
    </div>
    <div class="output-column">
      <div class="tabs">
        <button class="tab active" data-format="example">Example</button>
        <button class="tab" data-format="log">Log</button>
        <button class="tab" data-format="css-variables">CSS</button>
        <button class="tab" data-format="json">JSON</button>
        <button class="tab" data-format="w3-design-tokens">W3 Design Tokens</button>
        <button class="tab" data-format="svg">SVG</button>
      </div>
      <div class="event-log" id="event-log" style="display: none;"></div>
      <pre class="output" id="output" style="display: none;"></pre>
      <div class="visualization" id="visualization" style="display: none;">
        <label><input type="checkbox" id="show-connections" checked> Show connections</label>
        <div id="svg-container"></div>
      </div>
      <div class="example-view" id="example-view">
        <style id="example-style"></style>
        <div class="example-error" id="example-error" hidden></div>
        <div class="example-stage" id="example-stage"></div>
      </div>
    </div>
  </div>

  <template id="login-template">
    <form class="login-card" novalidate>
      <h2 class="login-title">Welcome back</h2>
      <p class="login-subtitle">Sign in to continue</p>
      <label class="login-field">
        <span>Email</span>
        <input type="email" placeholder="you@example.com" autocomplete="off">
      </label>
      <label class="login-field">
        <span>Password</span>
        <input type="password" placeholder="••••••••" autocomplete="off">
      </label>
      <button type="button" class="login-btn">Log in</button>
      <p class="login-footnote">Don't have an account? <a href="#">Sign up</a></p>
    </form>
  </template>

  <script type="module" src="editor.ts"></script>
</body>
</html>
